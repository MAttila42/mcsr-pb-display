name = "mcsr-pb-display"
main = "./src/index.ts"
compatibility_date = "2026-03-12"
compatibility_flags = [
  "nodejs_compat",
  "enable_request_signal",
  "request_signal_passthrough"
]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "mcsr-pb-display"
database_id = "cb05c75a-f2af-4a3d-811d-6e8da795b990"

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public/"
binding = "ASSETS"
